<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Delit</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
    height: 200vh;

    background: linear-gradient(to bottom, #000000, #2b2b2b);
}

/* ⭐ ЗВЁЗДЫ */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: moveStar linear infinite;
}

@keyframes moveStar {
    from {
        transform: translateX(0);
    }
    to {
        transform: translateX(-120vw);
    }
}

/* КОНТЕНТ */
.container {
    text-align: center;
    padding: 120px 20px;
}

h1 {
    font-size: 42px;
    color: orange;
    text-shadow: 0 0 10px rgba(255,140,0,0.5);
}

p {
    max-width: 600px;
    margin: 20px auto;
    font-size: 17px;
    color: #ddd;
}

/* КНОПКА */
.donate {
    margin-top: 500px;
    display: inline-block;
    padding: 15px 30px;
    background: orange;
    color: black;
    text-decoration: none;
    font-weight: bold;
    border-radius: 10px;
    transition: 0.3s;
}

.donate:hover {
    transform: scale(1.1);
}

/* СОЦСЕТИ */
.socials {
    margin-top: 120px;
}

.socials img {
    width: 35px;
    margin: 10px;
    transition: 0.3s;
}

.socials img:hover {
    transform: scale(1.2);
}

/* АНИМАЦИЯ */
.fade {
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

footer {
    margin-top: 80px;
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container fade">
    <h1>Хай, я Делит</h1>

    <p>
        начинающий программист, занимаюсь стримингом, блогерством и геймингом,
        постепенно прокачиваю свои навыки
    </p>
</div>

<div style="text-align:center;" class="fade">
    <a href="https://www.donationalerts.com/r/delitme" class="donate" target="_blank">
        Пожертвовать
    </a>
</div>

<div class="socials fade" style="text-align:center;">
    <a href="https://youtube.com/@delitmee?si=pvPlb8-M3GBPTd0U" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
    </a>

    <a href="https://t.me/DelitMe" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
    </a>

    <a href="https://discord.com/users/Wlepa_voprosi" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
    </a>

    <a href="https://tiktok.com/@delitmee" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
    </a>
</div>

<footer class="fade" style="text-align:center;">
    created by DelitMe
</footer>

<script>
// ⭐ РЕАЛЬНЫЕ ЗВЁЗДЫ
const starsContainer = document.getElementById("stars");

for (let i = 0; i < 120; i++) {
    let star = document.createElement("div");
    star.className = "star";

    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 120 + "vw";

    star.style.animationDuration = (15 + Math.random() * 30) + "s";

    starsContainer.appendChild(star);
}

// АНИМАЦИЯ СКРОЛЛА
const elements = document.querySelectorAll('.fade');

function showOnScroll() {
    elements.forEach(el => {
        const pos = el.getBoundingClientRect().top;
        if (pos < window.innerHeight - 100) {
            el.classList.add('show');
        }
    });
}

window.addEventListener('scroll', showOnScroll);
showOnScroll();
</script>

</body>
</html>
