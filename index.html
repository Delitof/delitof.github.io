<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delit</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: linear-gradient(to bottom, #000000, #2b2b2b);
  overflow-x: hidden;
}

/* ЗВЁЗДЫ */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* МЕНЮ */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  padding: 10px;
  text-align: center;
  backdrop-filter: blur(5px);
}

.nav a {
  color: orange;
  margin: 0 15px;
  text-decoration: none;
  font-size: 14px;
}

/* КОНТЕНТ */
.container {
  text-align: center;
  margin-top: 120px;
  padding: 20px;
}

/* ЗАГОЛОВОК */
h1 {
  color: orange;
  font-size: 32px;
}

/* ТЕКСТ */
p {
  font-size: 14px;
  max-width: 500px;
  margin: auto;
  line-height: 1.5;
}

/* КНОПКА */
.btn {
  margin-top: 40px;
  padding: 12px 25px;
  background: orange;
  color: black;
  border: none;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* СОЦСЕТИ */
.socials {
  margin-top: 200px;
}

.socials img {
  width: 30px;
  margin: 10px;
  transition: 0.3s;
}

.socials img:hover {
  transform: scale(1.2);
  filter: drop-shadow(0 0 5px orange);
}

/* FOOTER */
.footer {
  margin-top: 100px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<!-- МЕНЮ -->
<div class="nav">
  <a href="#">Главная</a>
  <a href="#donate">Донат</a>
  <a href="#socials">Соцсети</a>
</div>

<div class="container">

  <h1 id="typing"></h1>

  <p>
    Начинающий программист, также занимаюсь стриминговой деятельностью,
    блогерством, и просто геймингом, с течением времени прокачиваю свои навыки,
    если хочешь поддержать, валяй
  </p>

  <button class="btn" onclick="window.open('https://www.donationalerts.com/r/delitme')" id="donate">
    Поддержать
  </button>

  <div class="socials" id="socials">

    <a href="https://youtube.com/@delitmee?si=pvPlb8-M3GBPTd0U" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
    </a>

    <a href="https://t.me/DelitMe" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
    </a>

    <a href="https://tiktok.com/@delitmee" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
    </a>

    <a href="https://discord.com/users/Wlepa_voprosi" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
    </a>

  </div>

  <div class="footer">
    created by DelitMe
  </div>

</div>

<script>
/* ПЕЧАТАЮЩИЙСЯ ТЕКСТ */
const text = "Хай, я Делит";
let i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 80);
  }
}
typing();

/* ЗВЁЗДЫ */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.3
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";

  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();

    star.y += star.speed;

    if (star.y > canvas.height) {
      star.y = 0;
      star.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(drawStars);
}

drawStars();

/* АДАПТИВ */
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
